# SPA-friendly nginx config: gzip + long-cache for hashed assets, no-cache
# for index.html so deploys are picked up immediately.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers — sensible defaults for a static SPA.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Compression
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_vary on;

  # Hashed assets — immutable cache.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Everything else falls through to index.html for client-side routing.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
